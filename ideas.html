<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>IDEA PLANET 🪐</title>
<style>
:root {
  --bg:    #0A0A2E;
  --card:  rgba(255,255,255,0.07);
  --p1:    #FF6B9D;
  --p2:    #FFD93D;
  --p3:    #6BCB77;
  --p4:    #4ECDC4;
  --p5:    #A855F7;
  --tx:    #FFFFFF;
  --sub:   #B0B8D4;
  --r:     20px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--tx);
  min-height: 100vh;
  overflow-x: hidden;
}
.stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
.star {
  position: absolute;
  background: white;
  border-radius: 50%;
  animation: twinkle var(--d,3s) infinite alternate;
  animation-delay: var(--dl,0s);
}
@keyframes twinkle {
  from { opacity:.2; transform:scale(.8); }
  to   { opacity:1;  transform:scale(1.2); }
}
.page {
  position: relative; z-index: 1;
  max-width: 600px; margin: 0 auto;
  padding: 0 16px 80px;
}
header { padding: 20px 0 0; text-align: center; margin-bottom: 16px; }
.logo {
  font-size: 2rem; font-weight: 900;
  background: linear-gradient(90deg, var(--p1), var(--p2), var(--p3), var(--p4));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.id-badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--card); border: 1px solid rgba(255,255,255,.15);
  backdrop-filter: blur(10px); border-radius: 50px;
  padding: 8px 16px; font-size: .82rem; color: var(--sub); margin-top: 10px;
}
.id-badge strong { color: var(--p4); }
.lang-bar { display: flex; justify-content: center; margin: 12px 0; }
.sel {
  background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.15);
  color: white; border-radius: 50px; padding: 6px 14px;
  font-size: .82rem; cursor: pointer;
}
.sel option { background: #1A1A4E; color: white; }
.tabs {
  display: flex; gap: 8px; margin: 12px 0;
  background: rgba(255,255,255,.05); border-radius: 50px; padding: 6px;
}
.tab {
  flex: 1; border: none; background: transparent; color: var(--sub);
  border-radius: 50px; padding: 12px 10px; font-size: .95rem;
  font-weight: 700; cursor: pointer; transition: all .2s;
}
.tab.on {
  background: linear-gradient(135deg, var(--p5), var(--p1));
  color: white; box-shadow: 0 0 20px rgba(168,85,247,.4);
}
.card {
  background: var(--card); border: 1px solid rgba(255,255,255,.1);
  backdrop-filter: blur(10px); border-radius: var(--r);
  padding: 20px; margin-bottom: 16px;
}
.ctitle { font-size: 1.05rem; font-weight: 800; margin-bottom: 14px; color: var(--p2); }
.steps { display: flex; gap: 10px; margin-bottom: 20px; }
.step {
  flex: 1; background: rgba(255,255,255,.05); border-radius: 14px;
  padding: 14px 10px; text-align: center; font-size: .78rem; color: var(--sub); line-height: 1.5;
}
.step .se { font-size: 1.6rem; display: block; margin-bottom: 4px; }
.inp {
  width: 100%; background: rgba(255,255,255,.08);
  border: 2px solid rgba(255,255,255,.15); border-radius: 14px;
  padding: 14px 16px; color: white; font-size: 1.05rem;
  font-family: inherit; outline: none; transition: border-color .2s; margin-bottom: 14px;
}
.inp::placeholder { color: rgba(255,255,255,.3); }
.inp:focus { border-color: var(--p4); }
textarea.inp { resize: vertical; min-height: 100px; }
.rbtn {
  width: 100%; background: linear-gradient(135deg, var(--p1), var(--p5));
  border: none; border-radius: 50px; padding: 20px; color: white;
  font-size: 1.2rem; font-weight: 800; cursor: pointer;
  box-shadow: 0 0 30px rgba(255,107,157,.4); transition: all .2s;
}
.rbtn.rec {
  background: linear-gradient(135deg,#FF4444,#FF6B9D);
  animation: pglow 1.5s infinite;
}
@keyframes pglow {
  0%,100% { box-shadow: 0 0 20px rgba(255,68,68,.5); }
  50%      { box-shadow: 0 0 50px rgba(255,68,68,.9); }
}
#waveCanvas {
  width: 100%; height: 80px; border-radius: 12px;
  background: rgba(0,0,0,.3); display: none; margin: 12px 0;
}
.tbox {
  background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1);
  border-radius: 14px; padding: 14px; min-height: 70px;
  font-size: .9rem; color: var(--sub); line-height: 1.6;
  display: none; margin: 12px 0; white-space: pre-wrap;
}
.brow { display: flex; gap: 10px; margin-top: 12px; }
.btn {
  flex: 1; border: none; border-radius: 50px; padding: 14px;
  font-size: .95rem; font-weight: 700; cursor: pointer; transition: all .2s;
}
.btn-y { background: linear-gradient(135deg, var(--p2),#FF9A00); color: #1a1a1a; }
.btn-g { background: linear-gradient(135deg, var(--p3), var(--p4)); color: #0A0A2E; }
.btn-o {
  background: transparent; border: 1px solid rgba(255,255,255,.2);
  color: var(--sub); font-size: .82rem; text-align: center;
  width: 100%; margin-top: 8px; padding: 12px; border-radius: 50px;
  cursor: pointer;
}
.btn:hover { opacity: .9; }
.btn:disabled { opacity: .3; cursor: not-allowed; }
#textForm { display: none; margin-top: 14px; }
#resultArea { display: none; }
.clabel {
  font-size: .75rem; color: var(--sub); text-align: center;
  margin-bottom: 8px; text-transform: uppercase; letter-spacing: .08em;
}
.cwrap { border-radius: 16px; overflow: hidden; margin-bottom: 16px; }
.sgrid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 14px; }
.si {
  background: rgba(255,255,255,.05); border-radius: 14px;
  padding: 14px 10px; text-align: center;
}
.sn { font-size: 1.8rem; font-weight: 900; }
.sl { font-size: .72rem; color: var(--sub); margin-top: 4px; }
.sbw { height: 6px; background: rgba(255,255,255,.1); border-radius: 3px; overflow: hidden; margin-top: 8px; }
.sb  { height: 100%; border-radius: 3px; transition: width .8s ease; width: 0%; }
.subbtn {
  width: 100%; background: linear-gradient(135deg, var(--p3), var(--p4));
  border: none; border-radius: 50px; padding: 18px; color: #0A0A2E;
  font-size: 1.1rem; font-weight: 800; cursor: pointer;
  box-shadow: 0 0 25px rgba(107,203,119,.4); margin-top: 4px;
}
.pnote {
  font-size: .72rem; color: rgba(255,255,255,.25); text-align: center;
  padding: 10px; line-height: 1.6; white-space: pre-line; margin-top: 8px;
}
.whdr { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
.wtitle { font-size: 1rem; font-weight: 800; color: var(--p2); flex: 1; }
.wstatus { font-size: .75rem; color: var(--p5); display: none; align-items: center; gap: 6px; margin-bottom: 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
.spinner {
  width: 12px; height: 12px; border: 2px solid rgba(168,85,247,.3);
  border-top-color: var(--p5); border-radius: 50%;
  animation: spin .7s linear infinite; display: inline-block;
}
#wallFeed { display: flex; flex-direction: column; gap: 14px; }
.ic {
  background: var(--card); border: 1px solid rgba(255,255,255,.1);
  backdrop-filter: blur(10px); border-radius: var(--r);
  padding: 18px; transition: transform .2s;
}
.ic:hover { transform: translateY(-2px); }
.ich { display: flex; gap: 14px; align-items: flex-start; margin-bottom: 12px; }
.icon { width: 60px; height: 60px; border-radius: 12px; flex-shrink: 0; overflow: hidden; }
.icid { font-size: .72rem; color: var(--p4); letter-spacing: .05em; margin-bottom: 4px; }
.ict  { font-size: 1rem; font-weight: 700; line-height: 1.3; margin-bottom: 6px; }
.ice  { font-size: .82rem; color: var(--sub); line-height: 1.6; margin-bottom: 10px; }
.ico  {
  font-size: .75rem; color: rgba(255,255,255,.3); font-style: italic;
  border-left: 2px solid rgba(255,255,255,.1); padding-left: 8px; margin-bottom: 12px;
}
.icf  { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.badge {
  font-size: .72rem; padding: 4px 10px; border-radius: 20px; font-weight: 600;
}
.b1 { background: rgba(255,107,157,.2); color: var(--p1); }
.b2 { background: rgba(255,217,61,.2);  color: var(--p2); }
.b3 { background: rgba(78,205,196,.2);  color: var(--p4); }
.adopt {
  margin-left: auto; background: linear-gradient(135deg, var(--p5), var(--p1));
  border: none; border-radius: 50px; padding: 8px 16px;
  color: white; font-size: .8rem; font-weight: 700;
  cursor: pointer; text-decoration: none; display: inline-block;
  box-shadow: 0 0 12px rgba(168,85,247,.3);
}
.tslot { font-size: .82rem; color: var(--sub); line-height: 1.6; margin-bottom: 10px; }
.empty { text-align: center; padding: 40px 20px; color: var(--sub); font-size: .9rem; }
.eico  { font-size: 3rem; margin-bottom: 12px; }
.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--p5); color: white; padding: 12px 24px;
  border-radius: 50px; font-size: .9rem; font-weight: 700;
  box-shadow: 0 8px 24px rgba(168,85,247,.4);
  transition: transform .3s cubic-bezier(.34,1.56,.64,1);
  z-index: 9999; white-space: nowrap; pointer-events: none;
}
.toast.on { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="toast" id="toast"></div>

<div class="page">
  <header>
    <div class="logo">🪐 IDEA PLANET</div>
    <div>
      <div class="id-badge">🛸 <strong id="idTxt">...</strong> <span id="t-idtip" style="opacity:.5;font-size:.7rem">（あなたの秘密の名前）</span></div>
    </div>
    <div class="lang-bar">
      <select class="sel" id="uiLang" onchange="setUiLang(this.value)">
        <option value="ja">🇯🇵 日本語</option>
        <option value="en">🇺🇸 English</option>
        <option value="es">🇪🇸 Español</option>
        <option value="fr">🇫🇷 Français</option>
        <option value="zh">🇨🇳 中文</option>
        <option value="ko">🇰🇷 한국어</option>
        <option value="pt">🇧🇷 Português</option>
        <option value="de">🇩🇪 Deutsch</option>
        <option value="hi">🇮🇳 हिन्दी</option>
        <option value="ar">🇸🇦 عربي</option>
      </select>
    </div>
    <div class="tabs">
      <button class="tab on" id="tab0" onclick="showTab(0)"><span id="t-t0">🚀 アイデアを録音</span></button>
      <button class="tab"    id="tab1" onclick="showTab(1)"><span id="t-t1">🌍 みんなのアイデア</span></button>
    </div>
  </header>

  <!-- PANE 0: RECORD -->
  <div id="pane0">
    <div class="steps">
      <div class="step"><span class="se">🎤</span><span id="t-s0">声でアイデアを話す</span></div>
      <div class="step"><span class="se">✨</span><span id="t-s1">星座に変身！</span></div>
      <div class="step"><span class="se">🌍</span><span id="t-s2">技術者に届ける</span></div>
    </div>

    <div class="card">
      <div class="ctitle" id="t-ft">💡 あなたのアイデアは？</div>
      <input type="text" class="inp" id="ideaTitle" placeholder="例: 川のゴミを食べるロボット魚" maxlength="100">
      <button class="rbtn" id="recBtn" onclick="toggleRec()"><span id="t-rb">🎤 録音スタート！</span></button>
      <canvas id="waveCanvas"></canvas>
      <div class="tbox" id="tbox"></div>
      <div class="brow" id="stopRow" style="display:none">
        <button class="btn btn-y" onclick="stopRec()"><span id="t-sb">⏹ 停止して分析</span></button>
      </div>
      <button class="btn-o" onclick="toggleText()"><span id="t-tb">✏️ マイクなし → テキストで入力</span></button>
      <div id="textForm">
        <textarea class="inp" id="textIdea" rows="4" placeholder="あなたのアイデアを書いてね！" maxlength="500"></textarea>
        <button class="btn btn-y" style="width:100%" onclick="analyzeText()"><span id="t-ab">✨ スコアを計算！</span></button>
      </div>
    </div>

    <div id="resultArea">
      <div class="card">
        <div class="clabel" id="t-cl">✨ あなたの声の星座</div>
        <div class="cwrap" id="constWrap"></div>
      </div>
      <div class="card">
        <div class="ctitle" id="t-sc">🌟 ワンダースコア</div>
        <div class="sgrid">
          <div class="si">
            <div class="sn" id="sE" style="color:var(--p1)">--</div>
            <div class="sbw"><div class="sb" id="bE" style="background:var(--p1)"></div></div>
            <div class="sl" id="t-se">⚡ エネルギー</div>
          </div>
          <div class="si">
            <div class="sn" id="sC" style="color:var(--p4)">--</div>
            <div class="sbw"><div class="sb" id="bC" style="background:var(--p4)"></div></div>
            <div class="sl" id="t-sc2">💬 明瞭度</div>
          </div>
          <div class="si">
            <div class="sn" id="sI" style="color:var(--p3)">--</div>
            <div class="sbw"><div class="sb" id="bI" style="background:var(--p3)"></div></div>
            <div class="sl" id="t-si">🎨 想像力</div>
          </div>
        </div>
        <div style="text-align:center;font-size:.85rem;color:var(--sub)" id="totTxt"></div>
      </div>
      <button class="subbtn" onclick="submitIdea()"><span id="t-su">🚀 宇宙に送り出す！</span></button>
      <div class="pnote" id="t-pv">🔒 送信内容に名前・年齢・住所は含まれません。\n音声はあなたのブラウザ内だけで処理されます。\n保護者の方と一緒に確認してから送信してね！</div>
    </div>
  </div>

  <!-- PANE 1: WALL -->
  <div id="pane1" style="display:none">
    <div class="card">
      <div class="whdr">
        <div class="wtitle" id="t-wt">🌍 世界のアイデア</div>
        <select class="sel" id="wallLang" onchange="setWallLang(this.value)">
          <option value="ja">🇯🇵 日本語</option>
          <option value="en">🇺🇸 English</option>
          <option value="es">🇪🇸 Español</option>
          <option value="fr">🇫🇷 Français</option>
          <option value="zh">🇨🇳 中文</option>
          <option value="ko">🇰🇷 한국어</option>
          <option value="pt">🇧🇷 Português</option>
          <option value="de">🇩🇪 Deutsch</option>
          <option value="hi">🇮🇳 हिन्दी</option>
          <option value="ar">🇸🇦 عربي</option>
        </select>
      </div>
      <div class="wstatus" id="wstatus"><span class="spinner"></span><span id="t-ld">読み込み中...</span></div>
    </div>
    <div id="wallFeed"></div>
  </div>
</div>

<script>
var T = {
  ja:{
    idtip:'（あなたの秘密の名前）', t0:'🚀 アイデアを録音', t1:'🌍 みんなのアイデア',
    s0:'声でアイデアを話す', s1:'星座に変身！', s2:'技術者に届ける',
    ft:'💡 あなたのアイデアは？', ph:'例: 川のゴミを食べるロボット魚',
    rb:'🎤 録音スタート！', rbrec:'🔴 録音中… タップで停止',
    sb:'⏹ 停止して分析', tb:'✏️ マイクなし → テキストで入力',
    ab:'✨ スコアを計算！', cl:'✨ あなたの声の星座',
    sc:'🌟 ワンダースコア', se:'⚡ エネルギー', sc2:'💬 明瞭度', si:'🎨 想像力',
    su:'🚀 宇宙に送り出す！',
    pv:'🔒 送信内容に名前・年齢・住所は含まれません。\n音声はあなたのブラウザ内だけで処理されます。\n保護者の方と一緒に確認してから送信してね！',
    wt:'🌍 世界のアイデア', ld:'読み込み中...', lerr:'データを取得できませんでした',
    empty:'まだアイデアがありません。最初に投稿してみよう！',
    noTitle:'アイデアのタイトルを入れてね！', noScore:'まず録音してね！',
    toastSent:'🚀 宇宙に送り出しました！', noMic:'マイクが使えません。テキスト入力をお使いください。',
    adopt:'🔧 つくってみる！', total:'総合スコア: '
  },
  en:{
    idtip:'(your secret name)', t0:'🚀 Record Idea', t1:'🌍 Ideas from the World',
    s0:'Speak your idea', s1:'Turns into a constellation!', s2:'Reach builders worldwide',
    ft:"💡 What's your idea?", ph:'e.g. A robot fish that eats river trash',
    rb:'🎤 Start Recording!', rbrec:'🔴 Recording… tap to stop',
    sb:'⏹ Stop & Analyze', tb:'✏️ No mic? Type your idea',
    ab:'✨ Get Wonder Score!', cl:'✨ Your Voice Constellation',
    sc:'🌟 Wonder Score', se:'⚡ Energy', sc2:'💬 Clarity', si:'🎨 Imagination',
    su:'🚀 Send to the Universe!',
    pv:'🔒 No name, age, or location is shared.\nVoice is processed in your browser only.\nAsk a parent before sending!',
    wt:'🌍 Ideas from the World', ld:'Loading...', lerr:'Could not load ideas',
    empty:'No ideas yet — be the first!',
    noTitle:'Please give your idea a title!', noScore:'Record something first!',
    toastSent:'🚀 Sent to the universe!', noMic:'Mic unavailable. Please use text input.',
    adopt:'🔧 I\'ll build this!', total:'Total Score: '
  }
};

var SRLANG = {ja:'ja-JP',en:'en-US',es:'es-ES',fr:'fr-FR',zh:'zh-CN',ko:'ko-KR',pt:'pt-BR',de:'de-DE',hi:'hi-IN',ar:'ar-SA'};

var uiLang  = (navigator.language||'ja').split('-')[0];
if (!T[uiLang]) uiLang = 'en';
var wallLng = uiLang;
var myId    = '';
var mr      = null;
var chunks  = [];
var recogOn = false;
var recog   = null;
var txScript= '';
var wScore  = null;
var cSvg    = '';
var trCache = {};
var aCtx    = null;
var aN      = null;
var wAnimId = null;

/* ── Stars ── */
(function(){
  var c = document.getElementById('stars');
  for (var i=0; i<80; i++) {
    var s = document.createElement('div');
    s.className = 'star';
    var sz = Math.random()*2.5+0.5;
    s.style.cssText='width:'+sz+'px;height:'+sz+'px;left:'+(Math.random()*100)+'%;top:'+(Math.random()*100)+'%;--d:'+(2+Math.random()*4)+'s;--dl:'+(-Math.random()*4)+'s';
    c.appendChild(s);
  }
})();

/* ── ID ── */
var AN=['Panda','Fox','Koala','Tiger','Whale','Eagle','Dolphin','Otter','Penguin','Octopus','Peacock','Axolotl','Meerkat'];
var CO=['Nebula','Quasar','Pulsar','Comet','Aurora','Galaxy','Nova','Orbit'];
function mkId(){return CO[CO.length*Math.random()|0]+AN[AN.length*Math.random()|0]+'-'+(1000+Math.random()*9000|0);}
function initId(){myId=sessionStorage.getItem('ipId')||mkId();sessionStorage.setItem('ipId',myId);document.getElementById('idTxt').textContent=myId;}

/* ── I18N ── */
function t(k){return (T[uiLang]||T.en)[k]||'';}
var TMAP={idtip:'t-idtip',t0:'t-t0',t1:'t-t1',s0:'t-s0',s1:'t-s1',s2:'t-s2',ft:'t-ft',rb:'t-rb',sb:'t-sb',tb:'t-tb',ab:'t-ab',cl:'t-cl',sc:'t-sc',se:'t-se',sc2:'t-sc2',si:'t-si',su:'t-su',pv:'t-pv',wt:'t-wt',ld:'t-ld'};
function applyT(){
  Object.keys(TMAP).forEach(function(k){var el=document.getElementById(TMAP[k]);if(el)el.textContent=t(k);});
  document.getElementById('ideaTitle').placeholder=t('ph');
  document.getElementById('textIdea').placeholder=t('ph');
  document.getElementById('uiLang').value=uiLang;
  document.getElementById('wallLang').value=wallLng;
}
function setUiLang(l){uiLang=l;wallLng=l;applyT();}

/* ── Tabs ── */
function showTab(n){
  document.getElementById('pane0').style.display=n===0?'':'none';
  document.getElementById('pane1').style.display=n===1?'':'none';
  document.getElementById('tab0').className='tab'+(n===0?' on':'');
  document.getElementById('tab1').className='tab'+(n===1?' on':'');
  if(n===1)loadWall();
}

/* ── Recording ── */
function toggleRec(){
  if(mr&&mr.state==='recording'){stopRec();return;}
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){toast(t('noMic'));return;}
  navigator.mediaDevices.getUserMedia({audio:true}).then(startRec).catch(function(){toast(t('noMic'));});
}
function startRec(stream){
  chunks=[];txScript='';
  mr=new MediaRecorder(stream);
  aCtx=new (window.AudioContext||window.webkitAudioContext)();
  aN=aCtx.createAnalyser();aN.fftSize=256;
  aCtx.createMediaStreamSource(stream).connect(aN);
  showWave(true);drawWave();
  startRecog();
  mr.ondataavailable=function(e){if(e.data.size>0)chunks.push(e.data);};
  mr.onstop=function(){
    stream.getTracks().forEach(function(t){t.stop();});
    if(aCtx){aCtx.close();aCtx=null;}
    cancelAnimationFrame(wAnimId);
    showWave(false);stopRecog();
    var blob=new Blob(chunks,{type:'audio/webm'});
    var rd=new FileReader();
    rd.onload=function(e){procAudio(e.target.result);};
    rd.readAsArrayBuffer(blob);
  };
  mr.start(250);
  document.getElementById('recBtn').className='rbtn rec';
  document.getElementById('t-rb').textContent=t('rbrec');
  document.getElementById('stopRow').style.display='flex';
}
function stopRec(){
  if(mr&&mr.state==='recording')mr.stop();
  document.getElementById('recBtn').className='rbtn';
  document.getElementById('t-rb').textContent=t('rb');
  document.getElementById('stopRow').style.display='none';
}
function drawWave(){
  var cv=document.getElementById('waveCanvas');
  var cx=cv.getContext('2d');
  cv.width=cv.offsetWidth||300;cv.height=80;
  var buf=new Uint8Array(aN.frequencyBinCount);
  function fr(){
    if(!aN)return;
    aN.getByteTimeDomainData(buf);
    cx.clearRect(0,0,cv.width,80);
    cx.strokeStyle='#4ECDC4';cx.lineWidth=2;cx.beginPath();
    var sw=cv.width/buf.length,x=0;
    for(var i=0;i<buf.length;i++){var y=buf[i]/128*40;if(i===0)cx.moveTo(x,y);else cx.lineTo(x,y);x+=sw;}
    cx.stroke();
    wAnimId=requestAnimationFrame(fr);
  }
  fr();
}
function showWave(on){
  document.getElementById('waveCanvas').style.display=on?'block':'none';
  document.getElementById('tbox').style.display=on?'block':'none';
}

/* ── Speech Recognition ── */
function startRecog(){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR)return;
  recog=new SR();recog.continuous=true;recog.interimResults=true;
  recog.lang=SRLANG[uiLang]||'en-US';
  var base='';
  recog.onresult=function(e){
    var im='';
    for(var i=e.resultIndex;i<e.results.length;i++){
      var chunk=e.results[i][0].transcript;
      if(e.results[i].isFinal)base+=chunk+' ';else im=chunk;
    }
    txScript=base+im;
    document.getElementById('tbox').textContent=txScript;
  };
  recog.onerror=function(){};
  recog.onend=function(){if(recogOn)recog.start();};
  recogOn=true;recog.start();
}
function stopRecog(){recogOn=false;if(recog){recog.stop();recog=null;}}

/* ── Audio Processing ── */
function procAudio(ab){
  var ac=new (window.AudioContext||window.webkitAudioContext)();
  ac.decodeAudioData(ab,function(buf){
    wScore=wonderScore(buf,txScript);
    cSvg=constellation(buf,300,160);
    showResults();ac.close();
  },function(){toast('音声の解析に失敗しました');});
}

/* ── Wonder Score ── */
function wonderScore(buf,txt){
  var d=buf.getChannelData(0);
  var rms=0;for(var i=0;i<d.length;i++)rms+=d[i]*d[i];
  var energy=Math.min(Math.sqrt(rms/d.length)*600,100);
  var ns=0,tot=0,bl=Math.floor(buf.sampleRate*0.1);
  for(var b=0;b<d.length;b+=bl){
    var mx=0;
    for(var j=b;j<Math.min(b+bl,d.length);j++)if(Math.abs(d[j])>mx)mx=Math.abs(d[j]);
    tot++;if(mx>0.02)ns++;
  }
  var clarity=tot>0?(ns/tot)*100:50;
  var words=(txt||'').trim().split(/\s+/).filter(Boolean);
  var uniq=new Set(words.map(function(w){return w.toLowerCase();})).size;
  var imag=words.length>0?Math.min((uniq/words.length)*150,100):50;
  return{energy:Math.round(energy),clarity:Math.round(clarity),imagination:Math.round(imag),total:Math.round((energy+clarity+imag)/3)};
}

/* ── Constellation from AudioBuffer ── */
function constellation(buf,W,H){
  var d=buf.getChannelData(0);
  var pts=[],step=Math.floor(d.length/30)||1;
  for(var i=0;i<30;i++){var amp=Math.abs(d[i*step]||0);pts.push({x:(i/29)*(W-20)+10,y:H/2-amp*H*0.75});}
  var lines='';
  for(var k=1;k<pts.length;k++)
    lines+='<line x1="'+pts[k-1].x.toFixed(1)+'" y1="'+pts[k-1].y.toFixed(1)+'" x2="'+pts[k].x.toFixed(1)+'" y2="'+pts[k].y.toFixed(1)+'" stroke="#FFD93D" stroke-width="1" opacity="0.5"/>';
  var bg='';for(var n=0;n<20;n++)bg+='<circle cx="'+(Math.random()*(W-10)+5).toFixed(1)+'" cy="'+(Math.random()*(H-10)+5).toFixed(1)+'" r="0.8" fill="white" opacity="'+(0.3+Math.random()*0.5).toFixed(2)+'"/>';
  var dots=pts.map(function(p){return'<circle cx="'+p.x.toFixed(1)+'" cy="'+p.y.toFixed(1)+'" r="'+(2+Math.random()*3).toFixed(1)+'" fill="#4ECDC4" opacity="0.9"/>';}).join('');
  return'<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="background:#0A0A2E;border-radius:12px;width:100%;height:auto">'+bg+lines+dots+'</svg>';
}

/* ── Seeded constellation for wall cards ── */
function sr(s){var x=Math.sin(s)*10000;return x-Math.floor(x);}
function constellationSeed(seed,W,H){
  var pts=[];
  for(var i=0;i<18;i++)pts.push({x:sr(seed*97+i*31)*(W-16)+8,y:sr(seed*53+i*17)*(H-16)+8});
  var lines='';
  for(var k=1;k<pts.length;k++)
    lines+='<line x1="'+pts[k-1].x.toFixed(1)+'" y1="'+pts[k-1].y.toFixed(1)+'" x2="'+pts[k].x.toFixed(1)+'" y2="'+pts[k].y.toFixed(1)+'" stroke="#FFD93D" stroke-width="0.8" opacity="0.4"/>';
  var cols=['#4ECDC4','#FF6B9D','#A855F7','#6BCB77','#FFD93D'];
  var dots=pts.map(function(p,i){var c=cols[Math.floor(sr(seed*43+i)*cols.length)];return'<circle cx="'+p.x.toFixed(1)+'" cy="'+p.y.toFixed(1)+'" r="'+(1.5+sr(seed*71+i)*2.5).toFixed(1)+'" fill="'+c+'" opacity="0.9"/>';}).join('');
  return'<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="background:#0A0A2E;border-radius:8px;width:60px;height:60px">'+lines+dots+'</svg>';
}

/* ── Text-only mode ── */
function toggleText(){
  var f=document.getElementById('textForm');
  f.style.display=f.style.display==='block'?'none':'block';
}
function analyzeText(){
  var txt=document.getElementById('textIdea').value.trim();
  if(!txt){toast(t('noTitle'));return;}
  txScript=txt;
  var words=txt.split(/\s+/).filter(Boolean);
  var uniq=new Set(words.map(function(w){return w.toLowerCase();})).size;
  wScore={
    energy:Math.min(50+words.length*3,100)|0,
    clarity:Math.min(40+txt.length/5,100)|0,
    imagination:words.length>0?Math.min((uniq/words.length)*150,100)|0:50,
    total:0
  };
  wScore.total=((wScore.energy+wScore.clarity+wScore.imagination)/3)|0;
  var h=0;for(var i=0;i<txt.length;i++)h=(h*31+txt.charCodeAt(i))|0;
  var pts=[];
  for(var n=0;n<25;n++)pts.push({x:(sr(h*97+n*31)*280+10),y:(sr(h*53+n*17)*140+10)});
  var lines2='';
  for(var k=1;k<pts.length;k++)lines2+='<line x1="'+pts[k-1].x.toFixed(1)+'" y1="'+pts[k-1].y.toFixed(1)+'" x2="'+pts[k].x.toFixed(1)+'" y2="'+pts[k].y.toFixed(1)+'" stroke="#FFD93D" stroke-width="1" opacity="0.5"/>';
  var dots2=pts.map(function(p,i){return'<circle cx="'+p.x.toFixed(1)+'" cy="'+p.y.toFixed(1)+'" r="'+(2+sr(h*71+i)*3).toFixed(1)+'" fill="#4ECDC4" opacity="0.9"/>';}).join('');
  cSvg='<svg viewBox="0 0 300 160" xmlns="http://www.w3.org/2000/svg" style="background:#0A0A2E;border-radius:12px;width:100%;height:auto">'+lines2+dots2+'</svg>';
  showResults();
}

/* ── Show Results ── */
function showResults(){
  document.getElementById('resultArea').style.display='block';
  document.getElementById('constWrap').innerHTML=cSvg;
  function set(id,bid,v){document.getElementById(id).textContent=v+'%';setTimeout(function(){document.getElementById(bid).style.width=v+'%';},50);}
  set('sE','bE',wScore.energy);set('sC','bC',wScore.clarity);set('sI','bI',wScore.imagination);
  document.getElementById('totTxt').textContent=t('total')+wScore.total+'%';
  document.getElementById('resultArea').scrollIntoView({behavior:'smooth',block:'start'});
}

/* ── Submit ── */
function submitIdea(){
  var title=document.getElementById('ideaTitle').value.trim();
  if(!title){toast(t('noTitle'));return;}
  if(!wScore){toast(t('noScore'));return;}
  var body=[
    '## 💡 Idea',txScript||'(voice only)','',
    '## 🌟 Wonder Score',
    '- ⚡ Energy: '+wScore.energy+'%',
    '- 💬 Clarity: '+wScore.clarity+'%',
    '- 🎨 Imagination: '+wScore.imagination+'%',
    '- 🏆 Total: '+wScore.total+'%','',
    '---',
    '_Posted by '+myId+' via IDEA PLANET_',
    '_Language: '+navigator.language+'_'
  ].join('\n');
  window.open('https://github.com/pqrsking/1f-voice-analyzer/issues/new?title='+encodeURIComponent('💡 '+title)+'&body='+encodeURIComponent(body)+'&labels='+encodeURIComponent('child-idea'),'_blank');
  toast(t('toastSent'));
}

/* ── Wall ── */
function setWallLang(l){wallLng=l;trCache={};loadWall();}
function loadWall(){
  var feed=document.getElementById('wallFeed');
  var ws=document.getElementById('wstatus');
  ws.style.display='flex';
  document.getElementById('t-ld').textContent=t('ld');
  fetch('https://api.github.com/repos/pqrsking/1f-voice-analyzer/issues?labels=child-idea&state=open&per_page=30')
    .then(function(r){return r.json();})
    .then(function(issues){
      ws.style.display='none';
      if(!Array.isArray(issues)||issues.length===0){
        feed.innerHTML='<div class="empty"><div class="eico">🌱</div>'+esc(t('empty'))+'</div>';return;
      }
      feed.innerHTML='';
      issues.forEach(function(issue){
        var card=mkCard(issue);feed.appendChild(card);trCard(issue,card);
      });
    })
    .catch(function(){
      ws.style.display='none';
      feed.innerHTML='<div class="empty"><div class="eico">⚠️</div>'+esc(t('lerr'))+'</div>';
    });
}

function exExcerpt(body){
  if(!body)return'';
  var m=body.match(/## 💡[^\n]*\n([\s\S]*?)(?=\n##|$)/);
  return m?m[1].trim().slice(0,300):body.slice(0,200);
}
function exLang(body){var m=body&&body.match(/_Language:\s*([a-z]{2})/i);return m?m[1].toLowerCase():'en';}
function exId(body){var m=body&&body.match(/_Posted by ([^\s_]+)/);return m?m[1]:'Unknown';}
function exScore(body,key){var m=body&&body.match(new RegExp(key+':\\s*(\\d+)%'));return m?m[1]:'?';}

function mkCard(issue){
  var card=document.createElement('div');card.className='ic';
  var seed=issue.number||1;
  var svg=constellationSeed(seed,60,60);
  var fl=exLang(issue.body);
  var anon=exId(issue.body);
  var energy=exScore(issue.body,'Energy');
  var total=exScore(issue.body,'Total');
  var excerpt=exExcerpt(issue.body);
  var title=issue.title.replace(/^💡\s*/,'');
  card.innerHTML=
    '<div class="ich">'+
      '<div class="icon">'+svg+'</div>'+
      '<div style="flex:1;min-width:0">'+
        '<div class="icid">'+esc(anon)+'</div>'+
        '<div class="ict" data-orig="'+esc(title)+'">'+esc(title)+'</div>'+
      '</div>'+
    '</div>'+
    (excerpt?'<div class="ico">'+esc(excerpt.slice(0,100))+'</div>':'')+
    '<div class="tslot"><span class="spinner"></span></div>'+
    '<div class="icf">'+
      (energy!=='?'?'<span class="badge b1">⚡'+energy+'%</span>':'')+
      (total!=='?'?'<span class="badge b2">🏆'+total+'%</span>':'')+
      '<span class="badge b3">'+esc(fl.toUpperCase())+'</span>'+
      '<a class="adopt" href="'+esc(issue.html_url)+'" target="_blank" rel="noopener">'+esc(t('adopt'))+'</a>'+
    '</div>';
  return card;
}

function trCard(issue,card){
  var fl=exLang(issue.body);
  var title=issue.title.replace(/^💡\s*/,'');
  var excerpt=exExcerpt(issue.body);
  var slot=card.querySelector('.tslot');
  var titleEl=card.querySelector('.ict');
  Promise.all([trText(title,fl,wallLng),trText(excerpt,fl,wallLng)])
    .then(function(r){
      if(titleEl)titleEl.textContent=r[0]||title;
      if(slot){slot.className='tslot';slot.textContent=r[1]||excerpt;}
    })
    .catch(function(){if(slot){slot.className='tslot';slot.textContent=excerpt;}});
}

/* ── Translation ── */
function trText(txt,from,to){
  if(!txt)return Promise.resolve('');
  if(from===to)return Promise.resolve(txt);
  var key=from+'|'+to+'|'+txt.slice(0,60);
  if(trCache[key])return Promise.resolve(trCache[key]);
  var url='https://api.mymemory.translated.net/get?q='+encodeURIComponent(txt.slice(0,500))+'&langpair='+encodeURIComponent(from)+'|'+encodeURIComponent(to);
  var opts={};
  if(typeof AbortSignal!=='undefined'&&AbortSignal.timeout)opts.signal=AbortSignal.timeout(5000);
  return fetch(url,opts)
    .then(function(r){return r.json();})
    .then(function(d){
      var res=(d.responseStatus===200&&d.responseData)?d.responseData.translatedText:txt;
      trCache[key]=res;return res;
    })
    .catch(function(){return txt;});
}

/* ── Helpers ── */
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
var tTimer;
function toast(msg){var el=document.getElementById('toast');el.textContent=msg;el.classList.add('on');clearTimeout(tTimer);tTimer=setTimeout(function(){el.classList.remove('on');},2800);}

/* ── Init ── */
initId();applyT();
</script>
